<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="200" fill="#f4e8e8"/>
  
  <!-- Tablet body -->
  <rect x="50" y="40" width="200" height="130" rx="8" fill="#2c3e50"/>
  
  <!-- Tablet screen -->
  <rect x="65" y="55" width="170" height="110" rx="4" fill="#3498db"/>
  
  <!-- Screen content -->
  <circle cx="150" cy="90" r="18" fill="#1abc9c"/>
  <rect x="100" y="75" width="100" height="8" fill="#ecf0f1"/>
  <rect x="100" y="110" width="100" height="8" fill="#ecf0f1"/>
  <rect x="100" y="125" width="60" height="8" fill="#ecf0f1"/>
  
  <!-- Home button -->
  <circle cx="150" cy="175" r="8" fill="#7f8c8d"/>
  
  <!-- Text -->
  <text x="150" y="190" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c3e50">Tablet</text>
</svg>