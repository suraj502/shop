<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="200" fill="#ffe8e8"/>
  
  <!-- Phone body -->
  <rect x="80" y="30" width="140" height="140" rx="10" fill="#2c3e50"/>
  
  <!-- Phone screen -->
  <rect x="90" y="40" width="120" height="115" rx="3" fill="#3498db"/>
  
  <!-- Screen content -->
  <circle cx="150" cy="65" r="15" fill="#e74c3c"/>
  <rect x="100" y="85" width="100" height="6" fill="#ecf0f1"/>
  <rect x="100" y="95" width="100" height="6" fill="#ecf0f1"/>
  <rect x="100" y="105" width="60" height="6" fill="#ecf0f1"/>
  
  <!-- Camera -->
  <circle cx="150" cy="20" r="8" fill="#7f8c8d"/>
  <circle cx="150" cy="20" r="5" fill="#34495e"/>
  
  <!-- Text -->
  <text x="150" y="190" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c3e50">Smartphone</text>
</svg>